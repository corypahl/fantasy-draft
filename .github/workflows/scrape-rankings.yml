name: Scrape rankings

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape and upload rankings
        env:
          RANKINGS_BUCKET: ${{ secrets.RANKINGS_BUCKET }}
          RANKINGS_KEY: ${{ vars.RANKINGS_KEY || 'data/fantasy-data.json' }}
          NFL_SEASON: ${{ vars.NFL_SEASON || '2026' }}
        run: python scripts/scrape_rankings.py
